# minhanr.dev CI — Vercel 배포 이전에 tsc/eslint/build 검증.
# Vercel도 동일 단계를 실행하지만, GitHub Actions로 먼저 걸러 배포 실패를 예방하고
# PR에서 피드백을 빠르게 얻는다.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: minhanr-dev-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # CI 더미 값 — build 단계의 정적 prerender(/login 등)가 @supabase/ssr
          # 클라이언트를 construct하는데 실패하지 않도록 주입. 실제 API 호출은
          # 런타임에 Vercel env로 덮어쓴 값으로 동작.
          NEXT_PUBLIC_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-placeholder-anon-key'
          SUPABASE_SERVICE_KEY: 'ci-placeholder-service-key'
          GITHUB_REPO: 'Minhan-Bae/oikbas-vault'
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build
